<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>Calçado · Abril 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #222222;
  --surface3: #2a2a2a;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0ede8;
  --muted: #8a8580;
  --faint: #555250;
  --accent: #3b82f6;
  --accent-bg: rgba(59,130,246,0.12);
  --accent-border: rgba(59,130,246,0.3);
  --green: #10b981;
  --green-bg: rgba(16,185,129,0.1);
  --green-border: rgba(16,185,129,0.25);
  --amber: #f59e0b;
  --amber-bg: rgba(245,158,11,0.1);
  --amber-border: rgba(245,158,11,0.25);
  --red: #ef4444;
  --r: 10px;
  --r-lg: 14px;
}

* { 
  margin: 0; 
  padding: 0; 
  box-sizing: border-box; 
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

html {
  width: 100%;
  height: 100%;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  width: 100%;
  min-height: 100%;
}

/* ── APP SHELL ─────────────────────────────────────── */
.app { 
  display: flex; 
  flex-direction: column; 
  width: 100%;
  min-height: 100dvh;
}

/* desktop retém scroll interno controlado */
@media (min-width: 700px) {
  html, body { height: 100%; overflow: hidden; }
  .app { height: 100dvh; overflow: hidden; }
}

/* ── LOGIN / PROFILE SELECT ────────────────────────── */
#profile-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--bg);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

#profile-overlay.hidden {
  display: none;
}

.profile-header {
  flex-shrink: 0;
  background: var(--bg);
  padding: 24px 20px 16px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

.profile-header h2 { 
  font-size: 24px; 
  font-weight: 700; 
  margin-bottom: 8px; 
  color: var(--text);
}

.profile-header p { 
  color: var(--muted); 
  font-size: 13px;
  line-height: 1.4;
}

.profile-grid-container {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
}

.profile-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  max-width: 400px;
  margin: 0 auto;
}

@media (min-width: 500px) { 
  .profile-grid { 
    grid-template-columns: repeat(3, 1fr); 
  } 
}

.profile-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-user-select: none;
  user-select: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.profile-btn:active { 
  transform: scale(0.95); 
  background: var(--surface2); 
}

.profile-btn .av-lg {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--surface3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 18px;
  color: var(--muted);
  flex-shrink: 0;
}

.profile-btn.is-manager .av-lg { 
  background: var(--accent); 
  color: #fff; 
}

.profile-btn .p-name { 
  font-size: 12px; 
  font-weight: 600; 
  color: var(--text);
  word-break: break-word;
}

/* ── HEADER ─────────────────────────────────────────── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 12px;
  flex-shrink: 0;
  position: relative;
  z-index: 100;
}

.header-inner {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.brand { 
  display: flex; 
  align-items: center; 
  gap: 10px; 
  cursor: pointer;
  flex: 1;
  min-width: 0;
}

.brand-icon {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
}

.brand-text h1 { 
  font-size: 15px; 
  font-weight: 700; 
  letter-spacing: -.2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.brand-text p { 
  font-size: 11px; 
  color: var(--muted); 
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.user-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px 4px 4px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  flex-shrink: 0;
  white-space: nowrap;
}

.user-av {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--surface3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  flex-shrink: 0;
}

.user-av.av-me {
  background: var(--accent);
  color: #fff;
}

/* ── MAIN CONTENT ───────────────────────────────────── */
.content {
  display: flex;
  flex-direction: column;
  width: 100%;
}

@media (min-width: 700px) {
  .content {
    flex: 1;
    flex-direction: row;
    overflow: hidden;
    padding: 0;
  }

  .left-col {
    flex: 0 0 340px;
    width: 340px;
    padding: 24px;
    border-right: 1px solid var(--border);
    position: sticky;
    top: 0;
    height: calc(100vh - 60px);
    overflow-y: auto;
  }

  .right-col {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 24px;
  }
}

.left-col {
  flex: 0 0 auto;
  width: 100%;
  padding: 16px;
}

.right-col {
  flex: 1;
  padding: 16px;
  width: 100%;
}

/* ── CALENDAR ───────────────────────────────────────── */
.cal-section { 
  margin-bottom: 16px; 
}

.section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}

.dow {
  text-align: center;
  font-size: 9px;
  font-weight: 600;
  color: var(--faint);
  padding: 4px 0;
  text-transform: uppercase;
  letter-spacing: .05em;
}

.cal-day {
  border-radius: 8px;
  padding: 5px 3px 4px;
  cursor: pointer;
  background: var(--surface);
  border: 1.5px solid transparent;
  min-height: 64px;
  text-align: center;
  transition: border-color .12s, background .12s;
  -webkit-user-select: none;
  user-select: none;
}

.cal-day:active { 
  transform: scale(.95); 
}

.cal-day.selected { 
  border-color: var(--accent); 
  background: var(--accent-bg); 
}

.cal-day .d-num { 
  font-size: 9px; 
  font-weight: 600; 
  color: var(--faint); 
  margin-bottom: 2px; 
}

.cal-day .d-count { 
  font-size: 17px; 
  font-weight: 700; 
  color: var(--text); 
  line-height: 1.1; 
}

.cal-day .d-lbl { 
  font-size: 7.5px; 
  color: var(--faint); 
  margin-bottom: 3px; 
}

.cal-day .d-badge {
  display: inline-block;
  padding: 1px 4px;
  border-radius: 3px;
  font-family: 'DM Mono', monospace;
  font-size: 7.5px;
  font-weight: 500;
  background: var(--accent-bg);
  color: var(--accent);
}

.cal-day .d-badge.off { 
  background: var(--surface2); 
  color: var(--faint); 
}

.cal-day .d-badge.vac { 
  background: var(--green-bg); 
  color: var(--green); 
}

/* ── STATS ─────────────────────────────────────── */
.stats-row { 
  display: grid; 
  grid-template-columns: 1fr 1fr; 
  gap: 8px; 
  margin-bottom: 16px; 
}

.stats-row.hidden {
  display: none;
}

.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px;
}

.stat .sv { 
  font-size: 22px; 
  font-weight: 700; 
  color: var(--text); 
}

.stat .sl { 
  font-size: 10px; 
  color: var(--muted); 
  margin-top: 2px; 
  font-weight: 500; 
}

/* ── DAY DETAIL ─────────────────────────────────────── */
.detail-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
}

.empty-state {
  padding: 60px 20px;
  text-align: center;
  color: var(--faint);
  font-size: 14px;
}

.empty-state .ei { 
  font-size: 36px; 
  margin-bottom: 10px; 
}

/* Day header */
.day-header {
  padding: 16px 16px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.day-header h2 { 
  font-size: 20px; 
  font-weight: 700; 
  letter-spacing: -.3px; 
}

.day-header .meta { 
  font-size: 12px; 
  color: var(--muted); 
  margin-top: 3px; 
}

.day-num-badge {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 6px 12px;
  text-align: center;
  flex-shrink: 0;
}

.day-num-badge .dbn { 
  font-size: 22px; 
  font-weight: 700; 
}

.day-num-badge .dbl { 
  font-size: 9px; 
  color: var(--muted); 
  font-weight: 600; 
  text-transform: uppercase; 
  letter-spacing: .05em; 
}

/* Sections inside panel */
.panel-section { 
  padding: 14px 16px; 
  border-bottom: 1px solid var(--border); 
}

.panel-section:last-child { 
  border-bottom: none; 
}

.panel-section.hidden {
  display: none;
}

.sec-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 10px;
}

/* Workers */
.workers-grid { 
  display: grid; 
  grid-template-columns: 1fr 1fr; 
  gap: 5px; 
}

@media (min-width: 500px) { 
  .workers-grid { 
    grid-template-columns: repeat(3, 1fr); 
  } 
}

.wcard {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px;
  border-radius: 8px;
  background: var(--surface2);
}

.wcard.me-w { 
  background: var(--accent-bg); 
  border: 1px solid var(--accent-border); 
}

.wcard.off-w { 
  opacity: .3; 
}

.wcard.vac-w { 
  background: var(--green-bg); 
  opacity: .6; 
}

.av {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: 700;
  background: var(--surface3);
  color: var(--muted);
}

.av.av-me { 
  background: var(--accent); 
  color: #fff; 
}

.w-name { 
  font-size: 11px; 
  font-weight: 600; 
  color: var(--text); 
  line-height: 1.2; 
}

.w-code { 
  font-family: 'DM Mono', monospace; 
  font-size: 9.5px; 
  color: var(--muted); 
}

/* Chart */
.store-banner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  background: var(--green-bg);
  border: 1px solid var(--green-border);
  border-radius: 7px;
  padding: 7px 10px;
  font-size: 12px;
  font-weight: 600;
  color: var(--green);
  margin-bottom: 12px;
}

.chart-legend { 
  display: flex; 
  gap: 10px; 
  flex-wrap: wrap; 
  margin-bottom: 10px; 
}

.leg { 
  display: flex; 
  align-items: center; 
  gap: 4px; 
  font-size: 10px; 
  color: var(--muted); 
}

.leg-dot { 
  width: 8px; 
  height: 8px; 
  border-radius: 2px; 
  flex-shrink: 0; 
}

.h-row { 
  display: flex; 
  align-items: center; 
  gap: 7px; 
  margin-bottom: 3px; 
}

.h-lbl {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  width: 26px;
  text-align: right;
  flex-shrink: 0;
}

.h-lbl.open { 
  color: var(--text); 
  font-weight: 500; 
}

.h-lbl.closed { 
  color: var(--faint); 
}

.bar-wrap {
  flex: 1;
  border-radius: 4px;
  height: 18px;
  position: relative;
  overflow: hidden;
}

.bar-wrap.open-h { 
  background: rgba(255,255,255,0.04); 
}

.bar-wrap.closed-h { 
  background: var(--surface3); 
  opacity: .45; 
}

.bar-fill { 
  height: 100%; 
  border-radius: 4px; 
  transition: width .4s cubic-bezier(.4,0,.2,1); 
}

.bar-count {
  position: absolute;
  left: 6px;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
}

.bar-count.open { 
  color: var(--text); 
}

.bar-count.closed { 
  color: var(--faint); 
}

.bar-tag {
  position: absolute;
  right: 5px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 9px;
  font-weight: 700;
}

.divider {
  display: flex;
  align-items: center;
  gap: 6px;
  margin: 5px 0;
}

.div-line { 
  flex: 1; 
  border-top: 1px dashed var(--border2); 
}

.div-lbl { 
  font-size: 9px; 
  font-weight: 600; 
  color: var(--faint); 
  white-space: nowrap; 
}

.hour-names {
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
  line-height: 1.3;
}

/* Manager / Break advice */
.manager-card {
  background: var(--accent-bg);
  border: 1px solid var(--accent-border);
  border-radius: var(--r);
  padding: 14px;
}

.manager-card h3 { 
  font-size: 13px; 
  font-weight: 700; 
  color: var(--accent); 
  margin-bottom: 8px; 
}

.break-card {
  background: var(--amber-bg);
  border: 1px solid var(--amber-border);
  border-radius: var(--r);
  padding: 14px;
}

.break-card h3 { 
  font-size: 13px; 
  font-weight: 700; 
  color: var(--amber); 
  margin-bottom: 8px; 
}

.break-time {
  font-family: 'DM Mono', monospace;
  font-size: 26px;
  font-weight: 700;
  color: var(--amber);
  letter-spacing: -1px;
  margin: 6px 0;
}

.break-check { 
  font-size: 12px; 
  color: var(--amber); 
  margin: 4px 0; 
  display: flex; 
  align-items: flex-start; 
  gap: 5px; 
  line-height: 1.4; 
}

.cov-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--amber-border);
  font-size: 12px;
  color: var(--amber);
}

.cov-num {
  font-family: 'DM Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  background: var(--surface);
  color: var(--amber);
  border-radius: 6px;
  padding: 2px 8px;
}

.ok-card {
  background: var(--green-bg);
  border: 1px solid var(--green-border);
  border-radius: var(--r);
  padding: 14px;
}

.ok-card h3 { 
  font-size: 13px; 
  font-weight: 700; 
  color: var(--green); 
  margin-bottom: 5px; 
}

.ok-card p { 
  font-size: 12px; 
  color: var(--green); 
  opacity: .8; 
}

.off-card {
  background: var(--surface2);
  border-radius: var(--r);
  padding: 14px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
}

.hidden { 
  display: none !important; 
}

/* ── CHANGE HIGHLIGHT ──────────────────────────────── */
.d-num {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
  flex-wrap: wrap;
}

.change-dot {
  font-size: 8px;
  color: #f59e0b;
  line-height: 1;
}

.task-dot {
  font-size: 7px;
  color: var(--accent);
  line-height: 1;
}

.changed-w {
  border: 1px solid rgba(245,158,11,0.35) !important;
  background: rgba(245,158,11,0.07) !important;
}

.change-badge {
  display: inline-block;
  font-size: 9px;
  color: #f59e0b;
  font-weight: 600;
  background: rgba(245,158,11,0.12);
  border-radius: 3px;
  padding: 1px 4px;
  margin-left: 2px;
}

/* ── CHECKLIST ──────────────────────────────────────── */
#cl-text:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--surface3);
}

.cl-task {
  transition: opacity 0.2s;
}

.cl-done {
  opacity: 0.55;
}

/* ── PASSWORD MODAL ────────────────────────────────── */
#password-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

#password-overlay.hidden {
  display: none !important;
}

.password-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 24px;
  max-width: 300px;
  width: 100%;
  text-align: center;
}

.password-modal h2 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--text);
}

.password-modal p {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 20px;
}

#password-input {
  width: 100%;
  padding: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  font-size: 16px;
  font-family: 'DM Sans', sans-serif;
  margin-bottom: 16px;
  -webkit-appearance: none;
  appearance: none;
}

#password-input::placeholder {
  color: var(--faint);
}

#password-input:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--surface3);
}

.password-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

.password-buttons button {
  padding: 12px;
  border-radius: var(--r);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-appearance: none;
  appearance: none;
}

.password-buttons button:active {
  transform: scale(0.95);
}

#password-submit {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.password-error {
  font-size: 12px;
  color: var(--red);
  margin-top: 8px;
}
</style>
</head>
<body>

<div id="profile-overlay">
  <div class="profile-header">
    <h2>Quem és?</h2>
    <p>Seleciona o teu perfil para veres o teu horário</p>
  </div>
  <div class="profile-grid-container">
    <div class="profile-grid" id="profile-list"></div>
  </div>
</div>

<div id="password-overlay" class="hidden">
  <div class="password-modal">
    <h2>Acesso Restrito</h2>
    <p>Este perfil requer autenticação</p>
    <input type="password" id="password-input" placeholder="Introduz a senha" autocomplete="off">
    <div class="password-buttons">
      <button id="password-submit" onclick="checkPassword()">Confirmar</button>
      <button id="password-cancel" onclick="cancelPassword()">Cancelar</button>
    </div>
    <div id="password-error" class="password-error hidden">Senha incorreta</div>
  </div>
</div>

<div class="app hidden" id="main-app">
  <header>
    <div class="header-inner">
      <div class="brand" onclick="logout()">
        <div class="brand-icon">👟</div>
        <div class="brand-text">
          <h1>Calçado · Abril 2026</h1>
          <p>SPZ Leiria · SDSR Sports Division</p>
        </div>
      </div>

// ── CHECKLIST (localStorage) ──
function clKey(dateStr) { return 'checklist_' + dateStr; }
function clLoad(dateStr) {
  try { return JSON.parse(localStorage.getItem(clKey(dateStr)) || '[]'); } catch { return []; }
}
function clSave(dateStr, tasks) {
  try { localStorage.setItem(clKey(dateStr), JSON.stringify(tasks)); } catch {}
}
const URGENCY_ORDER = { alta: 0, media: 1, baixa: 2 };
const IMPORTANCE_ORDER = { alta: 0, media: 1, baixa: 2 };
function sortTasks(tasks) {
  return [...tasks].sort((a, b) => {
    const ud = URGENCY_ORDER[a.urgency] - URGENCY_ORDER[b.urgency];
    if (ud !== 0) return ud;
    return IMPORTANCE_ORDER[a.importance] - IMPORTANCE_ORDER[b.importance];
  });
}

let currentUser = null;
let selectedDay = 1;
let pendingUser = null;
let initialized = false;

const isOff = c => OFF.includes(c);
const getS = c => SH[c] || null;
const ini = n => n.split(' ').filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase();
const countW = idx => TEAM.filter(m => !isOff(m.sch[idx])).length;

function working(c, h) {
  const s = getS(c);
  if (!s) return false;
  if (h < s.s || h >= s.e) return false;
  if (s.bs !== null && h >= s.bs && h < s.be) return false;
  return true;
}

function getUserDayInfo(user, idx) {
  const c = user.sch[idx];
  if (isOff(c)) return { code: c, off: true };
  const s = getS(c);
  if (!s) return { code: c, off: true };
  return { code: c, off: false, s, hasBreak: s.bs !== null, bs: s.bs, be: s.be };
}

function init() {
  if (initialized) return;
  initialized = true;
  
  const list = document.getElementById('profile-list');
  if (!list) return;
  
  list.innerHTML = '';
  
  TEAM.sort((a,b) => a.name.localeCompare(b.name)).forEach(u => {
    const btn = document.createElement('div');
    btn.className = `profile-btn ${u.isManager ? 'is-manager' : ''}`;
    const displayName = TEAM.filter(x => x.name.split(' ')[0] === u.name.split(' ')[0]).length > 1 
      ? u.name 
      : u.name.split(' ')[0];
    btn.innerHTML = `<div class="av-lg">${ini(u.name)}</div><div class="p-name">${displayName}</div>`;
    btn.onclick = () => selectProfile(u);
    list.appendChild(btn);
  });
}

function selectProfile(user) {
  if (user.isManager) {
    pendingUser = user;
    document.getElementById('password-overlay').classList.remove('hidden');
    document.getElementById('password-input').value = '';
    document.getElementById('password-error').classList.add('hidden');
    document.getElementById('password-input').focus();
    return;
  }
  
  authenticateUser(user);
}

function checkPassword() {
  const password = document.getElementById('password-input').value;
  if (password === '123') {
    document.getElementById('password-overlay').classList.add('hidden');
    authenticateUser(pendingUser);
  } else {
    document.getElementById('password-error').classList.remove('hidden');
    document.getElementById('password-input').value = '';
    document.getElementById('password-input').focus();
  }
}

function cancelPassword() {
  document.getElementById('password-overlay').classList.add('hidden');
  pendingUser = null;
}

function authenticateUser(user) {
  currentUser = user;
  document.getElementById('profile-overlay').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  const displayName = TEAM.filter(x => x.name.split(' ')[0] === user.name.split(' ')[0]).length > 1 
    ? user.name 
    : user.name.split(' ')[0];
  document.getElementById('user-name').textContent = displayName;
  document.getElementById('user-av').textContent = ini(user.name);
  if (user.isManager) document.getElementById('user-av').classList.add('av-me');
  
  renderCal();
  // auto-select today if it's April 2026, else day 1
  const now = new Date();
  const todayDay = (now.getFullYear() === 2026 && now.getMonth() === 3) ? now.getDate() : 1;
  pick(Math.min(Math.max(todayDay, 1), 30));
}

function logout() {
  currentUser = null;
  pendingUser = null;
  document.getElementById('profile-overlay').classList.remove('hidden');
  document.getElementById('main-app').classList.add('hidden');
  document.getElementById('password-overlay').classList.add('hidden');
}

function renderCal() {
  let h = '';
  DOW.forEach(d => { h += `<div class="dow">${d}</div>`; });
  for (let i = 0; i < APR1_DOW; i++) h += '<div></div>';
  for (let d = 1; d <= 30; d++) {
    const c = currentUser.sch[d];
    const off = isOff(c), vac = c === 'Fe';
    const cnt = countW(d);
    let bc = off ? (vac ? 'vac' : 'off') : '';

    // check if any member has a change on this day
    const dayHasChange = Object.values(CHANGES).some(s => s.has(d));
    // check if current user has a change
    const myChange = CHANGES[currentUser.id] && CHANGES[currentUser.id].has(d);
    const changeBadge = (currentUser.isManager && dayHasChange)
      ? `<div class="change-dot" title="Alteração neste dia">⚡</div>`
      : myChange ? `<div class="change-dot" title="Alteração neste dia">⚡</div>` : '';

    // check if tasks exist for this day
    const dateStr = `2026-04-${String(d).padStart(2,'0')}`;
    const tasks = clLoad(dateStr);
    const taskBadge = tasks.length > 0
      ? `<div class="task-dot">${tasks.filter(t=>!t.done).length > 0 ? '●' : '✓'}</div>` : '';

    const cellInner = currentUser.isManager
      ? `<div class="d-count">${cnt}</div>
         <div class="d-lbl">eq</div>
         <span class="d-badge ${bc}">${c}</span>`
      : `<div class="d-count" style="font-size:13px;margin-top:4px">${off ? '—' : c}</div>
         <div class="d-lbl">${off ? (OFF_LABEL[c] || c).split(' ')[0] : 'turno'}</div>`;

    h += `<div class="cal-day${selectedDay===d?' selected':''}" onclick="pick(${d})">
      <div class="d-num">${d}${changeBadge}${taskBadge}</div>
      ${cellInner}
    </div>`;
  }
  document.getElementById('cal').innerHTML = h;

  const statsRow = document.getElementById('stats');
  if (currentUser.isManager) {
    statsRow.classList.add('hidden');
  } else {
    statsRow.classList.remove('hidden');
    let wd = 0;
    for (let d = 1; d <= 30; d++) { if (!getUserDayInfo(currentUser, d).off) wd++; }
    statsRow.innerHTML = `
      <div class="stat"><div class="sv">${wd}</div><div class="sl">Dias de trabalho</div></div>
      <div class="stat"><div class="sv">${wd * 8}h</div><div class="sl">Total de horas</div></div>`;
  }
}

function pick(day) {
  selectedDay = day;
  renderCal();

  const p = getUserDayInfo(currentUser, day);
  const dow = DOW[(APR1_DOW + day - 1) % 7];
  const cnt = countW(day);
  const firstName = currentUser.name.split(' ')[0];

  // ── cobertura (sempre calculada, usada pelo manager e pela lógica de pausa) ──
  const HOURS = [];
  for (let h = 9; h <= 23; h++) HOURS.push(h);
  const cov = {};
  HOURS.forEach(h => { cov[h] = { t: 0, me: false, workers: [] }; });
  TEAM.forEach(m => {
    const c = m.sch[day];
    HOURS.forEach(h => {
      if (working(c, h)) {
        cov[h].t++;
        if (m.id === currentUser.id) cov[h].me = true;
        const dn = TEAM.filter(x => x.name.split(' ')[0] === m.name.split(' ')[0]).length > 1
          ? m.name.split(' ')[0] + ' ' + m.name.split(' ')[1][0] + '.'
          : m.name.split(' ')[0];
        cov[h].workers.push(dn);
      }
    });
  });

  // ════════════════════════════════════════════════════
  // COLABORADOR — vista simplificada (só o próprio turno)
  // ════════════════════════════════════════════════════
  if (!currentUser.isManager) {
    let shiftHTML = '';
    if (p.off) {
      shiftHTML = `<div class="off-card" style="margin:0">${firstName} não trabalha hoje — ${OFF_LABEL[p.code] || p.code}</div>`;
    } else {
      const s = p.s;
      const breakLine = p.hasBreak
        ? `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)">
             Pausa: <span style="font-family:'DM Mono',monospace;color:var(--text)">${s.bs}:00 – ${s.be}:00</span>
           </div>`
        : `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)">Sem pausa obrigatória</div>`;
      shiftHTML = `<div style="background:var(--surface2);border-radius:var(--r);padding:14px">
        <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:6px">${p.code}</div>
        <div style="font-size:22px;font-weight:700;letter-spacing:-0.5px">${s.s}:00 → ${s.e === 24 ? '00:00' : s.e + ':00'}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">${s.e - s.s - (p.hasBreak ? 1 : 0)}h de trabalho efetivo</div>
        ${breakLine}
      </div>`;
    }

    document.getElementById('detail-label').textContent = `${dow}, ${day} de Abril 2026`;
    document.getElementById('detail').innerHTML = `
      <div class="day-header">
        <div>
          <h2>${dow}, ${day} de Abril</h2>
          <div class="meta">O teu turno</div>
        </div>
      </div>
      <div class="panel-section">
        ${shiftHTML}
      </div>`;
    return;
  }

  // ════════════════════════════════════════════════════
  // MANAGER — vista completa
  // ════════════════════════════════════════════════════
  const sorted = [...TEAM].sort((a, b) => {
    if (a.id === currentUser.id) return -1; if (b.id === currentUser.id) return 1;
    const ao = isOff(a.sch[day]), bo = isOff(b.sch[day]);
    return ao === bo ? 0 : ao ? 1 : -1;
  });
  const workers = sorted.map(m => {
    const c = m.sch[day];
    const off = isOff(c), vac = c === 'Fe';
    let cl = off ? (vac ? 'vac-w' : 'off-w') : '';
    const isMe = m.id === currentUser.id;
    if (isMe) cl = 'me-w';
    const hasChange = CHANGES[m.id] && CHANGES[m.id].has(day);
    const dn = TEAM.filter(x => x.name.split(' ')[0] === m.name.split(' ')[0]).length > 1
      ? m.name.split(' ')[0] + ' ' + m.name.split(' ')[1]
      : m.name.split(' ')[0];
    return `<div class="wcard ${cl}${hasChange?' changed-w':''}">
      <div class="av ${isMe ? 'av-me' : ''}">${ini(m.name)}</div>
      <div style="flex:1;min-width:0">
        <div class="w-name">${isMe ? '★ ' : ''}${dn}${hasChange ? ' <span class="change-badge">⚡ alt.</span>' : ''}</div>
        <div class="w-code">${c}</div>
      </div>
    </div>`;
  }).join('');

  const openHours = HOURS.filter(h => h >= STORE_OPEN && h < STORE_CLOSE);
  const maxC = Math.max(...openHours.map(h => cov[h].t), 1);
  let chartRows = '';
  HOURS.forEach(h => {
    const isOpen = h >= STORE_OPEN && h < STORE_CLOSE;
    const v = cov[h];
    if (h === STORE_OPEN) {
      chartRows += `<div class="divider"><div class="div-line"></div><div class="div-lbl">Loja abre 10h</div><div class="div-line"></div></div>`;
    }
    const pct = isOpen ? Math.round(v.t / maxC * 100) : Math.round(v.t / maxC * 55);
    let col = 'rgba(255,255,255,0.08)', tag = '';
    if (isOpen) {
      if (v.me) { col = '#3b82f6'; tag = `<span class="bar-tag" style="color:#3b82f6">TU</span>`; }
      else { col = '#10b981'; }
    }
    const namesHtml = v.workers.length > 0
      ? `<div class="hour-names">${v.workers.join(', ')}</div>` : '';
    chartRows += `<div class="h-row">
      <div class="h-lbl ${isOpen ? 'open' : 'closed'}">${h}h</div>
      <div class="bar-wrap ${isOpen ? 'open-h' : 'closed-h'}">
        <div class="bar-fill" style="width:${pct}%;background:${col}"></div>
        <span class="bar-count ${isOpen ? 'open' : 'closed'}">${v.t}</span>
        ${tag}
      </div>
      ${namesHtml}
    </div>`;
    if (h === STORE_CLOSE - 1) {
      chartRows += `<div class="divider"><div class="div-line"></div><div class="div-lbl">Loja fecha 23h</div><div class="div-line"></div></div>`;
    }
  });

  const workingNow = TEAM.filter(m => !isOff(m.sch[day])).length;
  const offNow = TEAM.length - workingNow;
  const dateStr = `2026-04-${String(day).padStart(2,'0')}`;

  document.getElementById('detail-label').textContent = `${dow}, ${day} de Abril 2026`;
  document.getElementById('detail').innerHTML = `
    <div class="day-header">
      <div>
        <h2>${dow}, ${day} de Abril</h2>
        <div class="meta">${cnt} elemento${cnt !== 1 ? 's' : ''} da equipa de calçado a trabalhar</div>
      </div>
      <div class="day-num-badge">
        <div class="dbn">${cnt}</div>
        <div class="dbl">calçado</div>
      </div>
    </div>
    <div class="panel-section">
      <div class="sec-title">Painel de Gestor</div>
      <div class="manager-card">
        <h3>Resumo da Equipa</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;">
          <div style="background:rgba(255,255,255,0.05);padding:10px;border-radius:8px;">
            <div style="font-size:18px;font-weight:700;">${workingNow}</div>
            <div style="font-size:10px;color:var(--muted);">A trabalhar</div>
          </div>
          <div style="background:rgba(255,255,255,0.05);padding:10px;border-radius:8px;">
            <div style="font-size:18px;font-weight:700;">${offNow}</div>
            <div style="font-size:10px;color:var(--muted);">De folga/férias</div>
          </div>
        </div>
      </div>
    </div>
    <div class="panel-section">
      <div class="sec-title">Equipa de Calçado</div>
      <div class="workers-grid">${workers}</div>
    </div>
    <div class="panel-section">
      <div class="sec-title">Cobertura por hora</div>
      <div class="store-banner">Loja aberta das 10h às 23h</div>
      <div class="chart-legend">
        <div class="leg"><div class="leg-dot" style="background:#3b82f6"></div>Tu</div>
        <div class="leg"><div class="leg-dot" style="background:#10b981"></div>Equipa (loja aberta)</div>
        <div class="leg"><div class="leg-dot" style="background:rgba(255,255,255,0.08)"></div>Fora de loja</div>
      </div>
      ${chartRows}
    </div>
    <div class="panel-section" id="checklist-section">
      <div class="sec-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>📋 Tarefas do dia</span>
        <span id="cl-count" style="font-size:10px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0"></span>
      </div>
      <div id="cl-add" style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;">
        <input id="cl-text" type="text" placeholder="Nova tarefa…" style="flex:1;min-width:120px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;">
        <select id="cl-urg" style="padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;">
          <option value="alta">🔴 Alta urgência</option>
          <option value="media" selected>🟡 Média urgência</option>
          <option value="baixa">🟢 Baixa urgência</option>
        </select>
        <select id="cl-imp" style="padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;">
          <option value="alta">★★★ Alta imp.</option>
          <option value="media" selected>★★☆ Média imp.</option>
          <option value="baixa">★☆☆ Baixa imp.</option>
        </select>
        <button onclick="clAdd('${dateStr}')" style="padding:8px 14px;background:var(--accent);border:none;border-radius:var(--r);color:#fff;font-size:13px;font-weight:600;cursor:pointer;">+ Adicionar</button>
      </div>
      <div id="cl-list"></div>
    </div>`;

  renderChecklist(dateStr);

  if (window.innerWidth < 700) {
    document.getElementById('detail').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ── CHECKLIST FUNCTIONS ───────────────────────────────
function renderChecklist(dateStr) {
  const tasks = sortTasks(clLoad(dateStr));
  const list = document.getElementById('cl-list');
  if (!list) return;
  const countEl = document.getElementById('cl-count');
  const done = tasks.filter(t=>t.done).length;
  if (countEl) countEl.textContent = `${done}/${tasks.length} concluída${tasks.length!==1?'s':''}`;
  if (tasks.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:20px 0;color:var(--faint);font-size:13px;">Sem tarefas para este dia</div>`;
    return;
  }
  const urgColor = { alta:'var(--red)', media:'var(--amber)', baixa:'var(--green)' };
  const urgIcon  = { alta:'🔴', media:'🟡', baixa:'🟢' };
  const impStars = { alta:'★★★', media:'★★☆', baixa:'★☆☆' };
  list.innerHTML = tasks.map((t, i) => `
    <div class="cl-task${t.done?' cl-done':''}" style="display:flex;align-items:flex-start;gap:8px;padding:10px;background:var(--surface2);border-radius:var(--r);margin-bottom:5px;border-left:3px solid ${urgColor[t.urgency]};">
      <input type="checkbox" ${t.done?'checked':''} onchange="clToggle('${dateStr}',${i})" style="margin-top:2px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;">
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;${t.done?'text-decoration:line-through;color:var(--muted)':''}">${t.text}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:3px;display:flex;gap:8px;">
          <span>${urgIcon[t.urgency]} ${t.urgency}</span>
          <span style="color:var(--faint)">${impStars[t.importance]}</span>
        </div>
      </div>
      <button onclick="clDelete('${dateStr}',${i})" style="background:none;border:none;color:var(--faint);cursor:pointer;font-size:14px;padding:0;flex-shrink:0;" title="Eliminar">✕</button>
    </div>`).join('');
}

function clAdd(dateStr) {
  const textEl = document.getElementById('cl-text');
  const text = textEl ? textEl.value.trim() : '';
  if (!text) return;
  const urgency = document.getElementById('cl-urg').value;
  const importance = document.getElementById('cl-imp').value;
  const tasks = clLoad(dateStr);
  tasks.push({ text, done: false, urgency, importance });
  clSave(dateStr, tasks);
  textEl.value = '';
  renderChecklist(dateStr);
  renderCal(); // refresh task badge in calendar
}

function clToggle(dateStr, rawIdx) {
  // rawIdx is pre-sort index — find by position in sorted list
  const sorted = sortTasks(clLoad(dateStr));
  const task = sorted[rawIdx];
  if (!task) return;
  const all = clLoad(dateStr);
  const match = all.find(t => t.text === task.text && t.urgency === task.urgency && t.importance === task.importance && t.done === task.done);
  if (match) match.done = !match.done;
  clSave(dateStr, all);
  renderChecklist(dateStr);
  renderCal();
}

function clDelete(dateStr, rawIdx) {
  const sorted = sortTasks(clLoad(dateStr));
  const task = sorted[rawIdx];
  if (!task) return;
  const all = clLoad(dateStr);
  const idx = all.findIndex(t => t.text === task.text && t.urgency === task.urgency && t.importance === task.importance);
  if (idx !== -1) all.splice(idx, 1);
  clSave(dateStr, all);
  renderChecklist(dateStr);
  renderCal();
}

// enter key in checklist input
document.addEventListener('keypress', function(e) {
  if (e.key === 'Enter' && document.activeElement && document.activeElement.id === 'cl-text') {
    const dateStr = `2026-04-${String(selectedDay).padStart(2,'0')}`;
    clAdd(dateStr);
  }
});

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function() {
    init();
    const passwordInput = document.getElementById('password-input');
    if (passwordInput) {
      passwordInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkPassword();
      });
    }
  });
} else {
  init();
  const passwordInput = document.getElementById('password-input');
  if (passwordInput) {
    passwordInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') checkPassword();
    });
  }
}
</script>
</body>
</html>
